    <main class="register-main">
      <h1>Inicio de sesión</h1>
      <!-- Contenedor principal del formulario de inicio de sesión -->
      <div class="signin-container">
        <div class="form-container">
          <form action="/ruta-a-tu-backend" method="POST">
            <div class="user-label_container">
              <label class="user-label" for="name">Usuario</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Escribe tu usuario"
                required
              />
            </div>
            <div class="user-label_container">
              <label for="password">Contraseña</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Escribe tu contraseña"
                class="signin-pw"
                required
              />
            </div>
            <button type="submit">Iniciar sesión</button>
          </form>
          <div class="signup-container">
            <p>
              No tienes cuenta? Regístrate <a href="/registrate.html">aquí</a>
            </p>
          </div>
        </div>
      </div>
      <div class="register-benefits">
        <p>Regístrate y accede a los proyectos <span>completos</span> ;)</p>
      </div>
    </main>
