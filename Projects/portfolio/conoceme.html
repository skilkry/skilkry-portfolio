<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Snap Test</title>
  <style>
    body, main {
      margin: 0;
      height: 100vh;
    }

    main {
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .container {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      text-align: center;
    }

    #section1 { background: lightblue; }
    #section2 { background: lightgreen; }
    #section3 { background: lightpink; }
  </style>
</head>
<body>
  <main>
    <div class="container" id="section1">Sección 1</div>
    <div class="container" id="section2">Sección 2</div>
    <div class="container" id="section3">Sección 3</div>
  </main>
</body>
</html>
